<body class="antialiased text-gray-800">

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Sound generator using Native Web Audio API
        const playBeep = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (type === 'beep') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(987.77, ctx.currentTime); 
                    gain.gain.setValueAtTime(0.06, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.15);
                } else if (type === 'success') {
                    const now = ctx.currentTime;
                    const osc1 = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc1.type = 'sine';
                    osc1.frequency.setValueAtTime(659.25, now); 
                    osc1.frequency.setValueAtTime(987.77, now + 0.12); 
                    gain.gain.setValueAtTime(0.06, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
                    osc1.connect(gain);
                    gain.connect(ctx.destination);
                    osc1.start();
                    osc1.stop(now + 0.5);
                } else if (type === 'click') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(600, ctx.currentTime);
                    gain.gain.setValueAtTime(0.03, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.06);
                }
            } catch (e) {
                console.warn("Audio feedback blocked or unsupported: ", e);
            }
        };

                { id: 'main_silver', src: '飛魚銀.jpeg', title: '飛魚銀主商品照', desc: '日系金屬科技質感，完美彰顯極簡洗鍊' },
                { id: 'detail1', src: '附圖1.jpeg', title: '慢燉牛肉料理', desc: '無水烹煮完美呈現鎖水甘甜' },

            const [bookingSuccess, setBookingSuccess] = useState(false);

                    } else {

            useEffect(() => {

            }, [selectedVariant]);

            // Cooking Timer Process
            useEffect(() => {
                let interval;
                if (cookingState === 'cooking') {
                    interval = setInterval(() => {
                        setCookingTimer((prev) => {
                            if (prev <= 1) {
                                clearInterval(interval);
                                setCookingState('done');
                                setPotOpen(true);
                                playBeep('success');
                                triggerNotification("✨ 烹煮模擬完成！食材極致原味已解鎖！");
                                return 5;
                            }
                            playBeep('beep');
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [cookingState]);

            const triggerNotification = (message) => {
                const id = Date.now();
                setNotifications(prev => [...prev, { id, message }]);
                setTimeout(() => {

            };

                playBeep('beep');
                const existingItemIndex = cart.findIndex(item => item.variant.id === selectedVariant.id);
                if (existingItemIndex > -1) {
                    const updatedCart = [...cart];
                    updatedCart[existingItemIndex].quantity += quantity;
                    setCart(updatedCart);
                } else {
                    setCart([...cart, { variant: selectedVariant, quantity, price: 21500 }]);
                }
                triggerNotification(`🛒 已將 Vermicular MINI (${selectedVariant.name}) 共 ${quantity} 台加入購物車！`);

            };

            const handleToggleWishlist = () => {
                playBeep('click');
                setIsWishlisted(!isWishlisted);
                triggerNotification(isWishlisted ? "💔 已將商品移出您的收藏清單" : "❤️ 已將商品加入您的收藏清單！");
            };

            const handleStartCooking = () => {
                playBeep('click');
                if (cookingState === 'cooking') return;
                setPotOpen(false);
                setCookingTimer(5);
                setCookingState('cooking');
                triggerNotification(`🔥 IH 智慧電子鑄鐵鍋正全力加熱中，請等候 5 秒...`);
            };

            const getModeName = (mode) => {
                switch(mode) {
                    case 'rice': return '完美炊飯';
                    case 'curry': return '無水咖哩';
                    case 'stew': return '慢燉牛肉';
                    default: return '';
                }
            };

            const applyPromo = () => {
                playBeep('click');
                if (promoCode.trim().toUpperCase() === 'SUMMER500') {
                    setAppliedDiscount(500);
                    setPromoSuccessMsg('🎉 成功套用夏日專屬優惠碼，現折 NT$500！');
                    setPromoError('');
                } else if (promoCode.trim().toUpperCase() === 'WELCOME100') {
                    setAppliedDiscount(100);
                    setPromoSuccessMsg('🎉 成功套用新會員好禮券，現折 NT$100！');
                    setPromoError('');
                } else {
                    setPromoError('❌ 查無此優惠代碼，請重新輸入。');
                    setPromoSuccessMsg('');
                }
            };

            const calculateCartTotal = () => {
                const itemsSubtotal = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
                const autoDiscount = itemsSubtotal >= 20000 ? 1000 : 0;
                const finalTotal = Math.max(0, itemsSubtotal - autoDiscount - appliedDiscount);
                return {
                    subtotal: itemsSubtotal,
                    autoDiscount,
                    finalTotal
                };
            };

            const handleQuantityChange = (val) => {
                playBeep('click');
                const newQty = quantity + val;
                if (newQty >= 1 && newQty <= 5) {
                    setQuantity(newQty);
                }
            };

            const updateCartItemQty = (index, delta) => {
                playBeep('click');
                const updated = [...cart];
                const newQty = updated[index].quantity + delta;
                if (newQty <= 0) {
                    updated.splice(index, 1);
                    triggerNotification("🗑️ 商品已自購物車中移除。");
                } else {
                    updated[index].quantity = newQty;
                }
                setCart(updated);
            };

            const handleCardNumberChange = (e) => {
                const val = e.target.value.replace(/\D/g, '').substring(0, 16);
                const formatted = val.match(/.{1,4}/g)?.join(' ') || val;
                setCardNumber(formatted);
            };

            const handleCardExpiryChange = (e) => {
                const val = e.target.value.replace(/\D/g, '').substring(0, 4);
                if (val.length >= 2) {
                    setCardExpiry(val.substring(0, 2) + '/' + val.substring(2));
                } else {
                    setCardExpiry(val);
                }
            };

                    alert("請完整填寫收件人、聯絡電話與收件地址。");
                    return;
                }
                setCheckoutStep(2);
            };

                playBeep('click');
                setCookingState('processing-payment');
                
                setTimeout(() => {
                    const randomId = 'HS-' + Math.floor(10000000 + Math.random() * 90000000);
                    setGeneratedOrderId(randomId);
                    setCheckoutStep(3);
                    setCart([]); 
                    setCookingState('idle');
                    playBeep('success');
                }, 1500);
            };

            const handleInStoreBookingSubmit = (e) => {
                e.preventDefault();
                playBeep('click');
                if (!bookingName || !bookingPhone || !bookingDate) {
                    alert("請填寫您的預約姓名、電話與預約體驗日期。");

            };

            const closeBookingModal = () => {
                setIsBookingOpen(false);
                setBookingSuccess(false);
                setBookingName('');
                setBookingPhone('');
                setBookingDate('');
            };

            const changeVariantAndImage = (v) => {
                playBeep('click');
                setSelectedVariant(v);
                setCurrentImgIndex(v.mainImgIndex);
            };

            const nextImage = () => {
                playBeep('click');
                setCurrentImgIndex((prev) => (prev + 1) % realImages.length);
            };

            const prevImage = () => {
                playBeep('click');
                setCurrentImgIndex((prev) => (prev - 1 + realImages.length) % realImages.length);
            };

            const { subtotal, autoDiscount, finalTotal } = calculateCartTotal();

            return (
                <div className="min-h-screen flex flex-col relative pb-16 md:pb-0">
                    
                    {/* Toast notification overlay */}
                    <div className="fixed top-5 right-5 z-[100] flex flex-col gap-3 max-w-sm w-full pointer-events-none">
                        {notifications.map(n => (
